# Netlify configuration for EFU Next.js App

[build]
  command = "npm run build"
  publish = ".next"

# Disable secrets scanning for .env.example (placeholders only)
[build.environment]
  SECRETS_SCAN_OMIT_PATHS = ".env.example,.env.sample"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Redirects for SPA fallback
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# CMS Admin access
[[redirects]]
  from = "/admin/*"
  to = "/admin/:splat"
  status = 200

# API routes
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200
